# version: 1.0.0
# Starship config optimized for Fish 4.0

### See https://fabrizioschiavi.github.io/pragmatapro-semiotics/ for icons

# Performance optimizations
command_timeout = 750 # milliseconds
scan_timeout = 100    # milliseconds for faster startup

add_newline = true
continuation_prompt = "[‚Ėł‚ĖĻ ](dimmed white)"

# Simplified format for better performance
format = """
$username at $hostname in $directory\
( \\($git_branch($git_status)$git_state\\))
$cmd_duration$jobs$sudo$character"""

right_format = """$singularity\
$kubernetes\
$vcsh\
$fossil_branch\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$zig\
$buf\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$status\
$os\
$battery\
$time """

# Add this to detect GoLand and override the right_format
[env_var.TERM_PROGRAM]
variable = "TERM_PROGRAM"
default = ""
format = "$env_value"

# Or use another environment variable that might identify GoLand
[env_var.TERMINAL_EMULATOR]
variable = "TERMINAL_EMULATOR"
default = ""
format = "$env_value"

[fill]
symbol = ' '

[character]
format = "\\$ "
success_symbol = "[\\$](green) "
error_symbol = "[\\$](red) "
vimcmd_symbol = "[V](green) "
# format = "$symbol"
# # not supported in zsh
# vimcmd_replace_one_symbol = "‚óĆ"
# vimcmd_replace_symbol = "‚Ė°"
# vimcmd_visual_symbol = "‚Ėľ"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "‚čą‚Ēą"
disabled = false

[username]
style_user = "purple"
style_root = "red bold"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
style = "red"
format = "[$hostname]($style)"

[directory]
truncation_length = 3
truncation_symbol = '‚Ä¶/'
truncate_to_repo = true
fish_style_pwd_dir_length = 1
style = "green"
format = '[$path]($style)'
repo_root_style = 'bright-green bold'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'
read_only = " ūüĒí"

[cmd_duration]
format = "[took $duration]($style) "
style = "yellow"
min_time = 2000
show_milliseconds = false

[jobs]
threshold = 1
symbol_threshold = 1

[localip]
ssh_only = true
format = " ‚óĮ[$localipv4](bold magenta)"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%H:%M"
style = "dimmed white"

[battery]
format = "[$percentage$symbol]($style)"
full_symbol = "ůĪä£"
charging_symbol = "[‚ÜĎ](italic bold green)"
discharging_symbol = "‚Üď"
unknown_symbol = "ůĪÉć"
empty_symbol = "ůĪä°"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = '[$branch]($style)'
style = "cyan"
truncation_symbol = "‚čĮ"
only_attached = true

[git_metrics]
format = '([+$added]($added_style))([-$deleted]($deleted_style))'
added_style = 'bold green'
deleted_style = 'bold red'
ignore_submodules = true
disabled = false

[git_status]
format = '([$all_status$ahead_behind]($style))'
modified = "[‚óŹ](bold red)"
staged = "[‚óŹ](bold bright-green)"
ahead = ""                                      #"‚á°${count}"
behind = ""                                     #"‚á£${count}"
diverged = ""                                   #"‚áē‚á°${ahead_count}‚á£${behind_count}"
untracked = "?${count}"
stashed = ""
deleted = "‚úė"
renamed = "¬Ľ"

[deno]
format = " [deno](italic) [‚ąę$version](green bold)"
version_format = "${raw}"

[lua]
format = " [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "ůįĘĪ"
style = "bold bright-yellow"

[nodejs]
format = " [${symbol}${version}]($style)"
style = "bold blue"
version_format = "${raw}"
symbol = "ůįéô"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [${symbol}${version}]($style)"
symbol = "ůįĆ†"
version_format = "${raw}"
style = "bold bright-yellow"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "ůįī≠"
version_format = "${raw}"
style = "bold red"

[rust]
format = " [$symbol$version]($style)"
symbol = ""
version_format = "${raw}"
style = "bold red"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "‚ó®"
style = "dimmed yellow italic bold"

[swift]
format = " [${symbol}${version}]($style)"
symbol = "ůįõ•"
style = "bold bright-red"
version_format = "${raw}"

[aws]
# disabled = true
format = " [$symbol($profile)$region($duration)]($style)"
style = "bold dimmed red"
symbol = "ůįłŹ"
expiration_symbol = "[ůįłŹ](red)"

[gcloud]
# disabled = true
format = " [$symbol($profile)($region)($domain)]($style)"
style = "bold dimmed yellow"
symbol = "ůĪá∂"

[buf]
symbol = "ůįŅė"
format = " [$symbol$version$buf_version]($style)"

[c]
symbol = "ůįôĪ"
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "‚óĮ"
format = " conda [$symbol$environment]($style)"

[dart]
symbol = "‚óĀ‚óÖ"
format = " dart [$symbol($version)]($style)"

[docker_context]
symbol = "‚óß"
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "‚Ė≥"
format = " exs [$symbol$version OTP $otp_version]($style)"

[elm]
symbol = "‚ó©"
format = " elm [$symbol($version)]($style)"

[golang]
symbol = "Óėß"
format = " [$symbol($version)]($style)"

[haskell]
symbol = "ůį≤í"
format = " [$symbol($version)]($style)"

[java]
format = " [$symbol$(version)](bright-red)"
symbol = "ůį¨∑"
version_format = "${major}.${minor}"
detect_extensions = ["java", "class", "jar"]

[julia]
symbol = "‚óé"
format = " jl [$symbol($version)]($style)"

[memory_usage]
threshold = 75
format = " ${ram}"
style = "bold dimmed white"
disabled = false

[nim]
symbol = "‚Ėī‚Ė≤‚Ėī"
format = " nim [$symbol($version)]($style)"

[nix_shell]
style = 'bold italic dimmed blue'
symbol = '‚ú∂'
format = '[$symbol nix‚é™$state‚é™]($style) [$name](italic dimmed white)'
impure_msg = '[‚ĆĹ](bold dimmed red)'
pure_msg = '[‚Ćĺ](bold dimmed green)'
unknown_msg = '[‚óĆ](bold dimmed ellow)'

[spack]
symbol = "‚óá"
format = " spack [$symbol$environment]($style)"
