[tools]
# agent-session observability TUI (Claude Code/Codex history, cost, tokens);
# github backend pulls the release binary — one pin for mac + devboxes
"github:luoyuctl/agenttrace" = "0.5.4"

[settings]
# honour work repos' .nvmrc / .node-version files
idiomatic_version_file_enable_tools = ["node"]
# mise's own missing-tools stderr warning is off: the starship prompt module
# (custom.mise_missing, red ⚠) is the single visible signal for missing pins
status.missing_tools = "never"
